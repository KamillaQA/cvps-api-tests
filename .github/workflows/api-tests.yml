name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar Newman
        run: npm install -g newman
      - name: Instalar Reporter HTML Extra
        run: npm install -g newman-reporter-htmlextra
       
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl", "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario", "value": "${{ secrets.USUARIO }}" },
              { "key": "senha", "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json
    
      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export report.html
          --reporter-htmlextra-title "Relatório de Testes da API CVPS"
          --reporter-htmlextra-logs \
          --reporter-htmlextra-showEnvironmentData \
          --reporter-htmlextra-darkTheme
        continue-on-error: true
      - name: Upload relatório
        uses: actions/upload-artifact@v4
        with:
          name: report-api-tests
          path: report.html
      - name: Deploy relatório no GitHub Pages
        if: always()
        run: |
          mkdir public
          cp report.html public/index.html
      
      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
