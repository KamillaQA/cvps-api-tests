name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar Newman
        run: npm install -g newman

      - name: Rodar testes
        run: |
          newman run collection.json \
          --env-var baseUrl=${{ secrets.BASE_URL }} \
          --env-var usuario=${{ secrets.USUARIO }} \
          --env-var senha=${{ secrets.SENHA }} \
          --env-var token=${{ secrets.TOKEN }} \
          --env-var apiVersion=${{ secrets.API_VERSION }} \
          --reporters cli
