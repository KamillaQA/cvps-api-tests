name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          sudo apt-get update
          sudo apt-get install -y jq bc

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,json \
          --reporter-json-export report.json
        continue-on-error: true

      # 🔹 Métricas
      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)

          if [ "$TOTAL" -eq 0 ]; then
            SUCCESS=0
          else
            SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      # 🔹 Timestamp (CORRIGIDO)
      - name: Gerar timestamp
        run: |
          DATE=$(TZ="America/Sao_Paulo" date +'%Y-%m-%d_%H-%M-%S')
          DATA_BR=$(TZ="America/Sao_Paulo" date +'%d/%m/%Y %H:%M:%S')

          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "DATA_BR=$DATA_BR" >> $GITHUB_ENV

      # 🔹 Criar pasta execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

      # 🔹 Extrair endpoints com falha
      - name: Extrair falhas
        run: |
          jq -r '.run.failures[]?.source.name' report.json | sort | uniq > falhas.txt || true

      # 🔹 Atualizar histórico
      - name: Atualizar histórico
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATA_BR\",
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS
          }]" $FILE > tmp.json && mv tmp.json $FILE

      # 🔹 Página de execução LIMPA
      - name: Criar página da execução
        run: |
          if [ "$FAILED" -eq 0 ]; then
            STATUS_COLOR="#16a34a"
            STATUS_TEXT="SUCESSO"
          else
            STATUS_COLOR="#dc2626"
            STATUS_TEXT="COM FALHAS"
          fi

          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')

          {
            echo "<!DOCTYPE html>"
            echo "<html lang='pt-BR'>"
            echo "<head>"
            echo "<meta charset='UTF-8'>"
            echo "<title>Execução - API CVPS</title>"
            echo "<style>"
            echo "body { background:#0a0e1a; color:#e2e8f0; font-family:Arial; margin:0 }"
            echo ".header { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #222 }"
            echo ".status { background:$STATUS_COLOR; padding:6px 12px; border-radius:20px }"
            echo ".container { padding:30px }"
            echo ".cards { display:flex; gap:20px; margin-bottom:20px }"
            echo ".card { flex:1; padding:20px; background:#111827; border-radius:10px; text-align:center }"
            echo ".lista { background:#111827; padding:20px; border-radius:10px }"
            echo "</style>"
            echo "</head>"
            echo "<body>"

            echo "<div class='header'>"
            echo "<div>📊 Execução API CVPS<br>$DATE</div>"
            echo "<div class='status'>$STATUS_TEXT</div>"
            echo "</div>"

            echo "<div class='container'>"
            echo "<p><b>Execução:</b> $DATA_BR</p>"

            echo "<div class='cards'>"
            echo "<div class='card'>✔ $PASSED</div>"
            echo "<div class='card'>❌ $FAILED</div>"
            echo "<div class='card'>📦 $TOTAL</div>"
            echo "<div class='card'>📊 $SUCCESS%</div>"
            echo "</div>"

            echo "<h2>🚨 Endpoints com falha</h2>"
            echo "<div class='lista'>"

            if [ -s falhas.txt ]; then
              while read linha; do
                echo "<p>❌ $linha</p>"
              done < falhas.txt
            else
              echo "<p>✅ Nenhuma falha</p>"
            fi

            echo "</div>"
            echo "<br>"
            echo "<a href='../index.html'>← Voltar</a>"
            echo "</div>"
            echo "</body>"
            echo "</html>"
          } > public/$DATE/index.html

      # 🔹 Dashboard simples (com data BR)
      - name: Gerar dashboard
        run: |
          {
            echo "<!DOCTYPE html>"
            echo "<html><head><meta charset='UTF-8'><title>Dashboard</title></head>"
            echo "<body style='background:#0a0e1a;color:white;font-family:Arial;padding:20px'>"

            echo "<h1>📊 Dashboard de Qualidade</h1>"
            echo "<p><b>Última execução:</b> $DATA_BR</p>"
            echo "<p>✔ Passou: $PASSED</p>"
            echo "<p>❌ Falhou: $FAILED</p>"
            echo "<p>📦 Total: $TOTAL</p>"
            echo "<p>📊 Sucesso: $SUCCESS%</p>"

            echo "<h2>📂 Histórico</h2>"

            for dir in public/*/; do
              name=\$(basename "\$dir")
              echo "<p><a href='./\$name/'>\$name</a></p>"
            done

            echo "</body></html>"
          } > public/index.html

      # 🔹 Deploy
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
