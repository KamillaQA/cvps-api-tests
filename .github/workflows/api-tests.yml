              .summary-value.gold  { color: #f6ad55; }
              .summary-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.07); }
              .status-pill {
                display: flex; align-items: center; gap: 6px;
                font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                padding: 5px 12px; border-radius: 20px; margin-left: auto;
              }
              .status-pill.ok  { border: 1px solid rgba(104,211,145,0.3); color: #68d391; background: rgba(104,211,145,0.07); }
              .status-pill.bad { border: 1px solid rgba(252,129,129,0.3); color: #fc8181; background: rgba(252,129,129,0.07); }
              .status-dot { width: 6px; height: 6px; border-radius: 50%; }
              .status-dot.ok  { background: #68d391; box-shadow: 0 0 6px #68d391; }
              .status-dot.bad { background: #fc8181; box-shadow: 0 0 6px #fc8181; }
              .progress-wrap { padding: 10px 28px; border-bottom: 1px solid rgba(255,255,255,0.04); }
              .progress-track { height: 3px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; }
              .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #4299e1, #68d391); }
              .meta-row { padding: 8px 28px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; }
              .meta-chip { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #4a5568; display: flex; align-items: center; gap: 5px; }
              .meta-chip span { color: #718096; }
              .iframe-shell { position: relative; }
              .iframe-overlay { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, rgba(99,179,237,0.4), rgba(104,211,145,0.4)); pointer-events: none; }
              #report-iframe { width: 100%; height: calc(100vh - 168px); border: none; display: block; background: #111827; }
            </style>
          </head>
          <body>
          <div class="topbar">
            <div class="brand">
              <div class="logo">Q</div>
              <div>
                <div class="brand-name">API Quality Dashboard</div>
                <div class="brand-sub">CVPS · Relatório Detalhado</div>
              </div>
            </div>
            <div class="topbar-right">
              <a href="../" class="back-btn">← voltar ao dashboard</a>
              <div class="run-badge" id="badge-date">carregando...</div>
            </div>
          </div>
          <div class="summary-bar">
            <div class="summary-item">
              <div><div class="summary-label">Passou</div><div class="summary-value green" id="kpi-passed">—</div></div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
              <div><div class="summary-label">Falhou</div><div class="summary-value red" id="kpi-failed">—</div></div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
              <div><div class="summary-label">Total</div><div class="summary-value blue" id="kpi-total">—</div></div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
              <div><div class="summary-label">Taxa de Sucesso</div><div class="summary-value gold" id="kpi-success">—</div></div>
            </div>
            <div class="status-pill ok" id="status-pill">
              <div class="status-dot ok" id="status-dot"></div>
              <span id="status-text">Passou</span>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
          </div>
          <div class="meta-row">
            <div class="meta-chip">execução: <span id="meta-date">—</span></div>
            <div class="meta-chip">runner: <span>ubuntu-latest</span></div>
            <div class="meta-chip">coleção: <span>collection.json</span></div>
            <div class="meta-chip">ferramenta: <span>newman · htmlextra</span></div>
          </div>
          <div class="iframe-shell">
            <div class="iframe-overlay"></div>
            <iframe id="report-iframe" src="report.html" title="Relatório Newman Detalhado"></iframe>
          </div>
          <script>
            async function loadMeta() {
              const parts = window.location.pathname.replace(/\/$/, '').split('/');
              const folder = parts[parts.length - 1];
              try {
                const res = await fetch('../history.json?_=' + Date.now());
                const history = await res.json();
                const entry = history.find(r => r.folder === folder || r.date === folder);
                if (entry) {
                  document.getElementById('kpi-passed').textContent  = entry.passed;
                  document.getElementById('kpi-failed').textContent  = entry.failed;
                  document.getElementById('kpi-total').textContent   = entry.total;
                  const s = parseFloat(entry.success);
                  document.getElementById('kpi-success').textContent = s.toFixed(1) + '%';
                  document.getElementById('progress-fill').style.width = s + '%';
                  document.getElementById('badge-date').textContent = 'main · ' + entry.date.replace(/_/g,' ');
                  document.getElementById('meta-date').textContent  = entry.date.replace(/_/g,' ');
                  const pill = document.getElementById('status-pill');
                  const dot  = document.getElementById('status-dot');
                  const txt  = document.getElementById('status-text');
                  if (s < 90) {
                    pill.className = 'status-pill bad'; dot.className = 'status-dot bad';
                    txt.textContent = 'Atenção — falhas acima do limite';
                  } else {
                    pill.className = 'status-pill ok'; dot.className = 'status-dot ok';
                    txt.textContent = 'Concluído com sucesso';
                  }
                }
              } catch(e) {
                const f = window.location.pathname.replace(/\/$/, '').split('/').pop();
                document.getElementById('badge-date').textContent = 'main · ' + f.replace(/_/g,' ');
                document.getElementById('meta-date').textContent  = f.replace(/_/g,' ');
              }
            }
            loadMeta();
          </script>
          </body>
          </html>
          WRAPEOF
      # 🔹 Gerar dashboard visual
      - name: Gerar dashboard
        run: |
          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')

          # Calcula status geral (verde se sucesso >= 90, vermelho abaixo)
          STATUS_COLOR="#68d391"
          STATUS_TEXT="Passou"
          if (( $(echo "$SUCCESS < 90" | bc -l) )); then
            STATUS_COLOR="#fc8181"
            STATUS_TEXT="Atenção"
          fi

          cat <<'HTMLEOF' > public/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
