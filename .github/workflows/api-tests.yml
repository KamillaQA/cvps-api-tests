name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq 

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment com secrets
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export report.html \
          --reporter-json-export report.json \
          --reporter-htmlextra-title "Relatório de Testes da API CVPS" \
          --reporter-htmlextra-logs \
          --reporter-htmlextra-showEnvironmentData \
          --reporter-htmlextra-darkTheme
        continue-on-error: true

      # 🔹 Extrair métricas
      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
          echo "TOTAL=$TOTAL"     >> $GITHUB_ENV
          echo "FAILED=$FAILED"   >> $GITHUB_ENV
          echo "PASSED=$PASSED"   >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      # 🔹 Timestamp
      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      # 🔹 Criar pasta da execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

     # 🔹 Salvar relatório Newman como report.html 
      - name: Salvar relatório
        run: cp report.html public/$DATE/report.html

      # 🔹 Atualizar histórico JSON
      - name: Atualizar histórico JSON
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi
          jq ". += [{
            \"date\": \"$DATE\", 
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS
          }]" $FILE > tmp.json && mv tmp.json $FILE
 # 🔹 Gerar wrapper visual da página de detalhes
      - name: Gerar wrapper da página de detalhes
        run: |
          cat > public/$DATE/index.html <<'WRAPEOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Relatório Detalhado · API CVPS</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              html, body { background: #0a0e1a; color: #e2e8f0; font-family: 'Syne', sans-serif; min-height: 100vh; }
              a { color: inherit; text-decoration: none; }
              .topbar {
                border-bottom: 1px solid rgba(99,179,237,0.12); padding: 14px 28px;
                display: flex; align-items: center; justify-content: space-between;
                background: rgba(255,255,255,0.015); position: sticky; top: 0; z-index: 100;
                backdrop-filter: blur(12px);
              }
              .brand { display: flex; align-items: center; gap: 10px; }
              .logo {
                width: 28px; height: 28px; border-radius: 7px;
                background: linear-gradient(135deg, #63b3ed 0%, #4299e1 100%);
                display: flex; align-items: center; justify-content: center;
                font-size: 13px; font-weight: 700; color: #fff;
              }
              .brand-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
              .brand-sub  { font-size: 10px; color: #718096; font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
              .topbar-right { display: flex; align-items: center; gap: 12px; }
              .back-btn {
                display: flex; align-items: center; gap: 6px;
                font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                padding: 6px 14px; border-radius: 20px;
                border: 1px solid rgba(99,179,237,0.25); color: #63b3ed;
                background: rgba(99,179,237,0.07); cursor: pointer; transition: background 0.15s;
              }
              .back-btn:hover { background: rgba(99,179,237,0.15); }
              .run-badge {
