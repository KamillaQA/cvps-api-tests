name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq bc

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export report.html \
          --reporter-json-export report.json \
          --reporter-htmlextra-title "Relatório de Testes da API CVPS" \
          --reporter-htmlextra-darkTheme
        continue-on-error: true

      # 🔹 Métricas
      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      # 🔹 Timestamp
      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      # 🔹 Criar pasta execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

      # 🔹 Salvar relatório REAL
      - name: Salvar relatório
        run: cp report.html public/$DATE/report.html

      # 🔹 Atualizar histórico JSON
      - name: Atualizar histórico
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS
          }]" $FILE > tmp.json && mv tmp.json $FILE

      # 🔹 Página de execução COMPLETA
      - name: Criar página da execução
        run: |
          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')

          if [ "$FAILED" -eq 0 ]; then
            STATUS_COLOR="#16a34a"
            STATUS_TEXT="SUCESSO"
          else
            STATUS_COLOR="#dc2626"
            STATUS_TEXT="COM FALHAS"
          fi

          cat <<EOF > public/$DATE/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
          <meta charset="UTF-8">
          <title>Execução - API CVPS</title>
          
          <style>
          body { background:#0a0e1a; color:#e2e8f0; font-family:Arial; margin:0 }
          .header { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #222 }
          .status { background:$STATUS_COLOR; padding:6px 12px; border-radius:20px }
          .container { padding:20px }
          .cards { display:flex; gap:20px }
          .card { flex:1; padding:20px; background:#111827; border-radius:10px; text-align:center }
          iframe { width:100%; height:70vh; border:none; margin-top:20px; border-radius:10px }
          </style>
          </head>
          
          <body>
          
          <div class="header">
            <div>📊 Execução API CVPS<br>${DATE}</div>
            <div class="status">${STATUS_TEXT}</div>
          </div>
          
          <div class="container">
          
          <p><b>Execução:</b> ${DATA_BR}</p>
          
          <div class="cards">
            <div class="card">✔ ${PASSED}</div>
            <div class="card">❌ ${FAILED}</div>
            <div class="card">📦 ${TOTAL}</div>
            <div class="card">📊 ${SUCCESS}%</div>
          </div>
          
          <a href="../index.html">← Voltar</a>
          
          <iframe src="./report.html"></iframe>
          
          </div>
          
          </body>
          </html>
          EOF

      # 🔹 Dashboard principal (mantém o seu atual)
      - name: Gerar dashboard
        run: |
          # mantém o dashboard existente (não sobrescreve layout)
          echo "Dashboard já existente mantido"

      # 🔹 Deploy GitHub Pages
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
