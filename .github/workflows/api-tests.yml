name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq bc

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,json \
          --reporter-json-export report.json
        continue-on-error: true

      # 🔹 Métricas
      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)

          if [ "$TOTAL" -eq 0 ]; then
            SUCCESS=0
          else
            SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
          fi

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      # 🔹 Timestamp BR
      - name: Gerar timestamp BR
        run: |
          DATE=$(TZ="America/Sao_Paulo" date +'%d-%m-%Y_%H-%M-%S')
          DATA_BR=$(TZ="America/Sao_Paulo" date +'%d/%m/%Y %H:%M:%S')

          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "DATA_BR=$DATA_BR" >> $GITHUB_ENV

      # 🔹 Criar pasta execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

      # 🔹 Extrair endpoints com falha
      - name: Extrair falhas
        run: |
          jq -r '.run.failures[]?.source.name' report.json | sort | uniq > falhas.txt || true
          echo "FALHAS=$(cat falhas.txt | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_ENV

      # 🔹 Atualizar histórico
      - name: Atualizar histórico
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATA_BR\",
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS,
            \"falhas\": \"$FALHAS\"
          }]" $FILE > tmp.json && mv tmp.json $FILE

      # 🔹 Página de execução limpa
      - name: Criar página da execução
        run: |
          if [ "$FAILED" -eq 0 ]; then
            STATUS_COLOR="#16a34a"
            STATUS_TEXT="SUCESSO"
          else
            STATUS_COLOR="#dc2626"
            STATUS_TEXT="COM FALHAS"
          fi

          cat <<EOF > public/$DATE/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
          <meta charset="UTF-8">
          <title>Execução - API CVPS</title>
          
          <style>
          body { background:#0a0e1a; color:#e2e8f0; font-family:Arial; margin:0 }
          .header { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #222 }
          .status { background:$STATUS_COLOR; padding:6px 12px; border-radius:20px }
          .container { padding:30px }
          .cards { display:flex; gap:20px; margin-bottom:20px }
          .card { flex:1; padding:20px; background:#111827; border-radius:10px; text-align:center }
          .lista { background:#111827; padding:20px; border-radius:10px }
          </style>
          </head>
          
          <body>
          
          <div class="header">
            <div>📊 Execução API CVPS<br>$DATE</div>
            <div class="status">$STATUS_TEXT</div>
          </div>
          
          <div class="container">
          
          <p><b>Execução:</b> $DATA_BR</p>
          
          <div class="cards">
            <div class="card">✔ $PASSED</div>
            <div class="card">❌ $FAILED</div>
            <div class="card">📦 $TOTAL</div>
            <div class="card">📊 $SUCCESS%</div>
          </div>
          
          <h2>🚨 Endpoints com falha</h2>
          
          <div class="lista">
          EOF
          
                    if [ -s falhas.txt ]; then
                      while read linha; do
                        echo "<p>❌ $linha</p>" >> public/$DATE/index.html
                      done < falhas.txt
                    else
                      echo "<p>✅ Nenhuma falha</p>" >> public/$DATE/index.html
                    fi
          
                    cat <<EOF >> public/$DATE/index.html
          </div>
          
          <br>
          <a href="../index.html">← Voltar</a>
          
          </div>
          </body>
          </html>
          EOF
          
                # 🔹 Dashboard principal
                - name: Gerar dashboard
                  run: |
                    cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Dashboard</title>
          </head>
          <body style="background:#0a0e1a;color:white;font-family:Arial;padding:20px">
          
          <h1>📊 Dashboard de Qualidade</h1>
          
          <p><b>Última execução:</b> $DATA_BR</p>
          <p>✔ Passou: $PASSED</p>
          <p>❌ Falhou: $FAILED</p>
          <p>📦 Total: $TOTAL</p>
          <p>📊 Sucesso: $SUCCESS%</p>
          
          <h2>📂 Histórico</h2>
          EOF
          
                    for dir in public/*/; do
                      name=$(basename "$dir")
                      echo "<p><a href='./$name/'>$name</a></p>" >> public/index.html
                    done

      # 🔹 Deploy
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
