name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment com secrets
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl", "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario", "value": "${{ secrets.USUARIO }}" },
              { "key": "senha", "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export report.html \
          --reporter-json-export report.json \
          --reporter-htmlextra-title "Relatório de Testes da API CVPS" \
          --reporter-htmlextra-logs \
          --reporter-htmlextra-showEnvironmentData \
          --reporter-htmlextra-darkTheme
        continue-on-error: true

      # 🔹 Extrair métricas CORRETAS
      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      # 🔹 Timestamp
      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      # 🔹 Criar pasta da execução
      - name: Criar estrutura
        run: |
          mkdir -p public/$DATE

      # 🔹 Salvar relatório
      - name: Salvar relatório
        run: |
          cp report.html public/$DATE/index.html

      # 🔹 Atualizar histórico JSON
      - name: Atualizar histórico JSON
        run: |
          FILE=public/history.json

          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq ". += [{
            \"date\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED
          }]" $FILE > tmp.json && mv tmp.json $FILE

      # 🔹 Gerar dashboard com gráfico
      - name: Gerar dashboard
        run: |
          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')
      
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Dashboard de Qualidade</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
          
          <h1>📊 Dashboard de Qualidade - API CVPS</h1>
          
          <p><b>Execução:</b> $DATA_BR</p>
          <p>✔ Passou: $PASSED</p>
          <p>❌ Falhou: $FAILED</p>
          <p>📦 Total de validações: $TOTAL</p>
          <p>📊 Sucesso: $SUCCESS%</p>
          
          <h2>📈 Evolução de Falhas</h2>
          <canvas id="grafico" width="600" height="300"></canvas>
          
          <script>
          fetch('history.json')
            .then(res => res.json())
            .then(data => {
              const labels = data.map(d => d.date);
              const failed = data.map(d => d.failed);
          
              new Chart(document.getElementById('grafico'), {
                type: 'line',
                data: {
                  labels: labels,
                  datasets: [{
                    label: 'Falhas',
                    data: failed
                  }]
                }
              });
            });
          </script>
          
          <h2>📂 Histórico</h2>
          EOF
          
              for dir in public/*/; do
                name=$(basename "$dir")
                if [ "$name" != "." ] && [ "$name" != "history.json" ]; then
                  echo "<p><a href='./$name/'>$name</a></p>" >> public/index.html
                fi
              done
      # 🔹 Publicar no GitHub Pages
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
