name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl", "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario", "value": "${{ secrets.USUARIO }}" },
              { "key": "senha", "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,htmlextra,json \
          --reporter-htmlextra-export report.html \
          --reporter-json-export report.json \
          --reporter-htmlextra-title "Relatório de Testes da API CVPS" \
          --reporter-htmlextra-logs \
          --reporter-htmlextra-showEnvironmentData \
          --reporter-htmlextra-darkTheme
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "SUCCESS_RATE=$SUCCESS_RATE" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV

      - name: Gerar timestamp
        run: echo "DATE=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Preparar estrutura
        run: |
          mkdir -p public/$DATE

      - name: Salvar relatório da execução
        run: |
          cp report.html public/$DATE/index.html

      - name: Gerar dashboard principal
        run: |
          echo "<h1>📊 Dashboard de Qualidade - API CVPS</h1>" > public/index.html
          echo "<p><b>Execução:</b> $(date)</p>" >> public/index.html
          echo "<p>✔ Passou: $PASSED</p>" >> public/index.html
          echo "<p>❌ Falhou: $FAILED</p>" >> public/index.html
          echo "<p>📦 Total: $TOTAL</p>" >> public/index.html
          echo "<p>📊 Sucesso: $SUCCESS_RATE%</p>" >> public/index.html
          echo "<h2>📂 Histórico</h2>" >> public/index.html

          for dir in public/*/; do
            name=$(basename "$dir")
            echo "<p><a href='./$name/'>$name</a></p>" >> public/index.html
          done

      - name: Upload relatório (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: report-api-tests
          path: report.html

      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
