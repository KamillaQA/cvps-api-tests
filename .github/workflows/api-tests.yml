                <div class="card-sub" id="kpi-delta">vs execução anterior</div>
              </div>
            </div>

            <div class="progress-wrap">
              <div class="progress-meta">
                <span>cobertura geral de testes</span>
                <span id="progress-label">0 / 0</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
              </div>
            </div>

            <div class="two-col">
              <div class="section">
                <div class="section-title">Evolução de Falhas &amp; Sucessos</div>
                <div class="legend">
                  <span><span class="legend-dot" style="background:#fc8181"></span>Falhas</span>
                  <span><span class="legend-dot" style="background:#68d391"></span>Passou</span>
                </div>
                <div style="position: relative; height: 190px;">
                  <canvas id="chartEvolucao" role="img" aria-label="Gráfico de evolução de falhas e sucessos por execução">Carregando dados...</canvas>
                </div>
              </div>

              <div class="section">
                <div class="section-title">Histórico de Execuções</div>
                <div id="hist-list"></div>
              </div>
            </div>

            <div class="section">
              <div class="section-title">Relatórios Detalhados</div>
              <div id="reports-list"></div>
            </div>

          </div>

          <script>
            async function loadDashboard() {
              let history = [];
              try {
                const res = await fetch('history.json?_=' + Date.now());
                history = await res.json();
              } catch(e) {
                console.warn('Sem histórico ainda');
              }

              if (!history.length) return;

              const last = history[history.length - 1];
              const prev = history.length > 1 ? history[history.length - 2] : null;

              // KPIs
              document.getElementById('kpi-passed').textContent  = last.passed;
              document.getElementById('kpi-failed').textContent  = last.failed;
              document.getElementById('kpi-total').textContent   = last.total;
              document.getElementById('kpi-success').textContent = parseFloat(last.success).toFixed(1) + '%';

              if (prev) {
                const delta = (parseFloat(last.success) - parseFloat(prev.success)).toFixed(1);
                const sign  = delta >= 0 ? '+' : '';
                document.getElementById('kpi-delta').textContent = sign + delta + '% vs anterior';
              }

              // Progress bar
              const pct = parseFloat(last.success);
              document.getElementById('progress-fill').style.width = pct + '%';
              document.getElementById('progress-label').textContent = last.passed + ' / ' + last.total;

              // Badge data
              const d = last.date.replace(/_/g, ' ').replace(/-(\d{2}) (\d{2}:\d{2}:\d{2})$/, ' $1:$2');
              document.getElementById('badge-date').textContent = 'main · ' + last.date.replace(/_/g,' ');

              // Status dot
              const dot = document.getElementById('run-dot');
              if (pct >= 90) {
                dot.style.background = '#68d391';
                dot.style.boxShadow  = '0 0 8px #68d391';
                document.getElementById('run-status').textContent = 'última execução concluída com sucesso';
              } else {
                dot.style.background = '#fc8181';
                dot.style.boxShadow  = '0 0 8px #fc8181';
                document.getElementById('run-status').textContent = 'última execução com falhas acima do limite';
              }

              // Chart
              const last12 = history.slice(-12);
              const labels  = last12.map(r => {
                const parts = r.date.split('_');
                return parts[0] ? parts[0].substring(5) : r.date.substring(0,10);
              });
              const failed  = last12.map(r => parseInt(r.failed));
              const passed  = last12.map(r => parseInt(r.passed));

              new Chart(document.getElementById('chartEvolucao'), {
                type: 'line',
                data: {
                  labels,
                  datasets: [
                    {
                      label: 'Falhas',
                      data: failed,
                      borderColor: '#fc8181',
                      backgroundColor: 'rgba(252,129,129,0.07)',
                      borderWidth: 2,
                      pointBackgroundColor: '#fc8181',
                      pointRadius: 3,
                      tension: 0.4,
                      fill: true
                    },
                    {
                      label: 'Passou',
                      data: passed,
                      borderColor: '#68d391',
                      backgroundColor: 'rgba(104,211,145,0.05)',
                      borderWidth: 2,
                      pointBackgroundColor: '#68d391',
                      pointRadius: 3,
                      tension: 0.4,
                      fill: true
                    }
                  ]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                    x: {
                      grid: { color: 'rgba(255,255,255,0.03)' },
                      ticks: { color: '#4a5568', font: { family: 'IBM Plex Mono', size: 9 }, maxRotation: 45, autoSkip: true }
                    },
                    y: {
                      grid: { color: 'rgba(255,255,255,0.03)' },
                      ticks: { color: '#4a5568', font: { family: 'IBM Plex Mono', size: 9 } }
                    }
                  }
                }
              });

              // Histórico
              const histList = document.getElementById('hist-list');
              const recent = [...history].reverse().slice(0, 8);
              histList.innerHTML = recent.map(r => {
                const s = parseFloat(r.success);
                const bad = s < 90;
                return '<div class="hist-row">' +
                  '<div class="hist-dot' + (bad ? ' bad' : '') + '"></div>' +
                  '<div class="hist-date">' + r.date.replace(/_/g,' ') + '</div>' +
                  '<div class="hist-track"><div class="hist-fill' + (bad ? ' bad' : '') + '" style="width:' + s + '%"></div></div>' +
                  '<div class="hist-pct">' + s.toFixed(0) + '%</div>' +
                '</div>';
              }).join('');

              // Links para relatórios
              const reportsList = document.getElementById('reports-list');
              reportsList.innerHTML = recent.map(r =>
                '<a class="report-link" href="./' + r.folder + '/">' +
                  '<span>' + r.date.replace(/_/g,' ') + ' / index.html</span>' +
                  '<span class="report-arrow">→</span>' +
                '</a>'
              ).join('');
            }

            loadDashboard();
          </script>

          </body>
          </html>
          HTMLEOF

      # 🔹 Publicar no GitHub Pages
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
