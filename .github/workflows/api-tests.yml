          <div class="body">

            <div class="run-header">
              <div class="run-dot" id="run-dot"></div>
              <div class="run-info" id="run-status">última execução concluída</div>
              <div class="run-right">newman · collection.json</div>
            </div>

            <div class="cards">
              <div class="card passed">
                <div class="card-label">Passou</div>
                <div class="card-value" id="kpi-passed">—</div>
                <div class="card-sub">assertions</div>
              </div>
              <div class="card failed">
                <div class="card-label">Falhou</div>
                <div class="card-value" id="kpi-failed">—</div>
                <div class="card-sub">assertions</div>
              </div>
              <div class="card total">
                <div class="card-label">Total</div>
                <div class="card-value" id="kpi-total">—</div>
                <div class="card-sub">validações</div>
              </div>
              <div class="card success">
                <div class="card-label">Taxa de Sucesso</div>
