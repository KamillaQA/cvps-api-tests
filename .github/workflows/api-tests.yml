name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq 

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment com secrets
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,json \
          --reporter-json-export report.json
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
      
          REQUESTS=$(jq '.run.stats.requests.total' report.json)
          PREREQUEST=$(jq '.run.stats.prerequests.total' report.json)
          TESTS=$(jq '.run.stats.tests.total' report.json)
      
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
      
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV
      
          echo "REQUESTS=$REQUESTS" >> $GITHUB_ENV
          echo "PREREQUEST=$PREREQUEST" >> $GITHUB_ENV
          echo "TESTS=$TESTS" >> $GITHUB_ENV

      # 🔹 Timestamp
      - name: Gerar timestamp
        run: |
          DATE=$(TZ="America/Sao_Paulo" date +'%Y-%m-%d_%H-%M-%S')
          HUMAN_DATE=$(TZ="America/Sao_Paulo" date +'%d/%m às %H:%M')
          EXEC_TS=$(TZ="America/Sao_Paulo" date +%s)
          
          DISPLAY_DATE="Executado em ${HUMAN_DATE}"
      
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "DISPLAY_DATE=$DISPLAY_DATE" >> $GITHUB_ENV

      # 🔹 Criar pasta da execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

      - name: Gerar dados detalhados
        run: |
          mkdir -p public/$DATE
      
          jq '{
            summary: .run.stats,
            timings: .run.timings,
            failures: .run.failures,
            executions: (.run.executions | map({
              item: .item,
              cursor: .cursor,
              request: .request,
              response: .response
            }))
          }' report.json > public/$DATE/details.json
          
      # 🔹 Atualizar histórico JSON
      - name: Atualizar histórico JSON
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi
      
          jq ". += [{
            \"date\": \"$DATE\", 
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS,
            \"summary\": {
              \"requests\": $REQUESTS,
              \"prerequest\": $PREREQUEST,
              \"tests\": $TESTS
            }
          }]" $FILE > tmp.json && mv tmp.json $FILE
          
     # 🔹 Gerar wrapper
      - name: Gerar página de detalhes
        run: |
          cat > public/$DATE/index.html <<'EOF'
          <!DOCTYPE html>
          
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Relatório Detalhado</title>
        
            <style>
              body {
                background:#0a0e1a;
                color:#e2e8f0;
                font-family:'Segoe UI', sans-serif;
                margin:0;
              }
        
              .topbar {
                padding:15px 25px;
                display:flex;
                justify-content:space-between;
                border-bottom:1px solid rgba(255,255,255,0.05);
              }
        
              .summary-bar {
                display:flex;
                gap:25px;
                padding:15px 25px;
                border-bottom:1px solid rgba(255,255,255,0.05);
              }
        
              .summary-item {
                font-family:monospace;
              }
        
              .green { color:#68d391; }
              .red { color:#fc8181; }
              .blue { color:#63b3ed; }
              .gold { color:#f6ad55; }
        
              .progress {
                height:4px;
                background:#111;
              }
        
              .progress div {
                height:100%;
                background:linear-gradient(90deg,#4299e1,#68d391);
              }
        
              .content {
                padding:25px;
              }
        
              table {
                width:100%;
                border-collapse:collapse;
                margin-top:20px;
                font-family:monospace;
              }
        
              td,th {
                padding:10px;
                border-bottom:1px solid #222;
              }
        
              .fail { color:#fc8181; }
            </style>
          </head>
        
          <body>
        
          <div class="topbar">
            <div>
              <b>API Quality Dashboard</b><br>
              <small>Relatório detalhado</small>
              <div class="run-badge" id="badge-date"></div>
            </div>
          
            <div style="display:flex; align-items:center; gap:12px;">
          
              <a href="../" style="
                font-family: monospace;
                font-size: 11px;
                padding: 6px 12px;
                border-radius: 20px;
                border: 1px solid rgba(99,179,237,0.3);
                color: #63b3ed;
                background: rgba(99,179,237,0.08);
                text-decoration:none;
              ">
                ← voltar ao dashboard
              </a>
          
              <div>${{ env.DISPLAY_DATE }}</div>
          
            </div>
          </div>
        
          <div class="summary-bar">
            <div class="summary-item">
              PASSOU<br><span class="green" id="passed"></span>
            </div>
            <div class="summary-item">
              FALHOU<br><span class="red" id="failed"></span>
            </div>
            <div class="summary-item">
              TOTAL<br><span class="blue" id="total"></span>
            </div>
            <div class="summary-item">
              SUCESSO<br><span class="gold" id="success"></span>
            </div>
          </div>
        
          <div class="progress">
            <div id="progress-bar" style="width:0%"></div>
          </div>
        
          <div class="content">
          <h3>Erros encontrados</h3>
          <div id="errors-list"></div>
            <h3>Resumo dos Testes</h3>
        
            <table id="summary-table"></table>
        
          </div>
        
          <script>
            async function load() {
        
              const [detailsRes, historyRes] = await Promise.all([
                fetch('details.json'),
                fetch('../history.json')
              ]);
        
              const details = await detailsRes.json();
              const history = await historyRes.json();
        
              const current = history[history.length - 1];
        
              // TOPO
              document.getElementById('passed').textContent = current.passed;
              document.getElementById('failed').textContent = current.failed;
              document.getElementById('total').textContent = current.total;
              document.getElementById('success').textContent = current.success + '%';
        
              document.getElementById('progress-bar').style.width = current.success + '%';
        
              // SUMMARY
              const s = details.summary;
              const failures = details.failures || [];
              const errorsList = document.getElementById('errors-list');
              
              if (!failures.length) {
                errorsList.innerHTML = '<div style="color:#68d391;">✔ Nenhum erro</div>';
              } else {
                errorsList.innerHTML = failures.map(f => {
                const exec = details.executions.find(e => 
                  e.item.name === f.source?.name
                );
                
                const method = exec?.request?.method || '';
                const url = exec?.request?.url?.raw || '';
                
                const name = f.source?.name || 'request';
                const msg  = f.error?.message || 'erro desconhecido';
              
                return `
                  <div style="
                    padding:10px;
                    border-bottom:1px solid rgba(255,255,255,0.05);
                    font-family:monospace;
                    font-size:11px;
                  ">
                    <div style="color:#63b3ed;">${method} ${url}</div>
                    <div style="color:#fc8181;">${name}</div>
                    <div style="color:#a0aec0;">${msg}</div>
                  </div>
                `;
                }).join('');
              }
        
              document.getElementById('summary-table').innerHTML = `
                <tr><th>Item</th><th>Total</th><th>Failed</th></tr>
                <tr><td>Requests</td><td>${s.requests.total}</td><td>${s.requests.failed}</td></tr>
                <tr><td>Prerequest Scripts</td><td>${s.prerequests.total}</td><td>${s.prerequests.failed}</td></tr>
                <tr><td>Test Scripts</td><td>${s.tests.total}</td><td>${s.tests.failed}</td></tr>
                <tr class="fail">
                  <td>Assertions</td>
                  <td>${s.assertions.total}</td>
                  <td>${s.assertions.failed}</td>
                </tr>
              `;
            }
        
            load();
          </script>
        
          </body>
          </html>
          EOF
      # 🔹 Gerar dashboard visual
      - name: Gerar dashboard
        run: |
          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')

          # Calcula status geral (verde se sucesso >= 90, vermelho abaixo)
          STATUS_COLOR="#68d391"
          STATUS_TEXT="Passou"
          if (( $(echo "$SUCCESS < 90" | bc -l) )); then
            STATUS_COLOR="#fc8181"
            STATUS_TEXT="Atenção"
          fi

          cat <<'HTMLEOF' > public/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Dashboard de Qualidade · API CVPS</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              html, body {
                background: #0a0e1a;
                color: #e2e8f0;
                font-family: 'Syne', sans-serif;
                min-height: 100vh;
              }
              a { color: inherit; text-decoration: none; }

              /* ── Topbar ── */
              .topbar {
                border-bottom: 1px solid rgba(99,179,237,0.12);
                padding: 16px 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(255,255,255,0.015);
                position: sticky; top: 0; z-index: 10;
                backdrop-filter: blur(8px);
              }
              .brand { display: flex; align-items: center; gap: 10px; }
              .logo {
                width: 30px; height: 30px; border-radius: 7px;
                background: linear-gradient(135deg, #63b3ed 0%, #4299e1 100%);
                display: flex; align-items: center; justify-content: center;
                font-size: 14px; font-weight: 700; color: #fff;
              }
              .brand-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }
              .brand-sub  { font-size: 11px; color: #718096; font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
              .run-badge {
                font-family: 'IBM Plex Mono', monospace;
                font-size: 11px;
                padding: 5px 12px;
                border-radius: 20px;
                border: 1px solid rgba(99,179,237,0.25);
                color: #63b3ed;
                background: rgba(99,179,237,0.07);
              }

              /* ── Body ── */
              .body { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

              /* ── Run header ── */
              .run-header {
                display: flex; align-items: center; gap: 10px;
                margin-bottom: 24px;
              }
              .run-dot {
                width: 8px; height: 8px; border-radius: 50%;
                background: STATUS_COLOR_PLACEHOLDER;
                box-shadow: 0 0 8px STATUS_COLOR_PLACEHOLDER;
              }
              .run-info { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #718096; }
              .run-right { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #4a5568; }

              /* ── KPI Cards ── */
              .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
              @media (max-width: 700px) { .cards { grid-template-columns: repeat(2, 1fr); } }
              .card {
                background: rgba(255,255,255,0.025);
                border: 1px solid rgba(255,255,255,0.06);
                border-radius: 12px;
                padding: 18px 20px;
                position: relative; overflow: hidden;
              }
              .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
              .card.passed::before  { background: #68d391; }
              .card.failed::before  { background: #fc8181; }
              .card.total::before   { background: #63b3ed; }
              .card.success::before { background: #f6ad55; }
              .card-label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.09em; font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px; }
              .card-value { font-size: 34px; font-weight: 700; line-height: 1; }
              .card.passed  .card-value { color: #68d391; }
              .card.failed  .card-value { color: #fc8181; }
              .card.total   .card-value { color: #63b3ed; }
              .card.success .card-value { color: #f6ad55; }
              .card-sub { font-size: 11px; color: #4a5568; margin-top: 5px; font-family: 'IBM Plex Mono', monospace; }

              /* ── Progress ── */
              .progress-wrap { margin-bottom: 24px; }
              .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: #718096; font-family: 'IBM Plex Mono', monospace; margin-bottom: 7px; }
              .progress-bar  { height: 5px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; }
              .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #4299e1, #68d391); transition: width 0.8s ease; }

              /* ── Two columns ── */
              .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
              @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

              .section {
                background: rgba(255,255,255,0.02);
                border: 1px solid rgba(255,255,255,0.055);
                border-radius: 12px;
                padding: 20px 22px;
              }
              .section-title { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.09em; font-family: 'IBM Plex Mono', monospace; margin-bottom: 16px; }

              /* ── History rows ── */
              .hist-row {
                display: flex; align-items: center; gap: 10px;
                padding: 9px 0;
                border-bottom: 1px solid rgba(255,255,255,0.035);
                font-size: 12px;
              }
              .hist-row:last-child { border-bottom: none; }
              .hist-dot   { width: 6px; height: 6px; border-radius: 50%; background: #68d391; flex-shrink: 0; }
              .hist-dot.bad { background: #fc8181; }
              .hist-date  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #718096; min-width: 130px; }
              .hist-track { flex: 1; background: rgba(255,255,255,0.04); height: 3px; border-radius: 99px; overflow: hidden; }
              .hist-fill  { height: 100%; border-radius: 99px; background: #68d391; }
              .hist-fill.bad { background: #fc8181; }
              .hist-pct   { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #a0aec0; min-width: 36px; text-align: right; }

              /* ── Report links ── */
              .report-link {
                display: flex; align-items: center; justify-content: space-between;
                padding: 10px 14px; border-radius: 8px;
                background: rgba(99,179,237,0.04);
                border: 1px solid rgba(99,179,237,0.12);
                margin-bottom: 8px;
                color: #a0aec0;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 11px;
                transition: background 0.15s;
              }
              .report-link:hover { background: rgba(99,179,237,0.10); color: #e2e8f0; }
              .report-arrow { color: #63b3ed; }

              /* ── Legend ── */
              .legend { display: flex; gap: 16px; font-size: 11px; color: #718096; font-family: 'IBM Plex Mono', monospace; margin-bottom: 10px; }
              .legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
            </style>
          </head>
          <body>

          <div class="topbar">
            <div>
              <b>API Quality Dashboard</b><br>
              <small>Relatório detalhado</small>
            </div>
          
            <div style="display:flex; align-items:center; gap:12px;"> 
              <div id="run-date"></div>
          
            </div>
          </div>

          <div class="body">

            <div class="run-header">
              <div class="run-dot" id="run-dot"></div>
              <div class="run-info" id="run-status">última execução concluída</div>
              <div class="run-right">newman · collection.json</div>
            </div>

            <div class="cards">
              <div class="card passed">
                <div class="card-label">Passou</div>
                <div class="card-value" id="kpi-passed">—</div>
                <div class="card-sub">assertions</div>
              </div>
              <div class="card failed">
                <div class="card-label">Falhou</div>
                <div class="card-value" id="kpi-failed">—</div>
                <div class="card-sub">assertions</div>
              </div>
              <div class="card total">
                <div class="card-label">Total</div>
                <div class="card-value" id="kpi-total">—</div>
                <div class="card-sub">validações</div>
              </div>
              <div class="card success">
                <div class="card-label">Taxa de Sucesso</div>
                <div class="card-value" id="kpi-success">—</div>
                <div class="card-sub" id="kpi-delta">vs execução anterior</div>
              </div>
            </div>

            <div class="progress-wrap">
              <div class="progress-meta">
                <span>cobertura geral de testes</span>
                <span id="progress-label">0 / 0</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
              </div>
            </div>

            <div class="two-col">
              <div class="section">
                <div class="section-title">Evolução de Falhas &amp; Sucessos</div>
                <div class="legend">
                  <span><span class="legend-dot" style="background:#fc8181"></span>Falhas</span>
                  <span><span class="legend-dot" style="background:#68d391"></span>Passou</span>
                </div>
                <div style="position: relative; height: 190px;">
                  <canvas id="chartEvolucao" role="img" aria-label="Gráfico de evolução de falhas e sucessos por execução">Carregando dados...</canvas>
                </div>
              </div>

              <div class="section">
                <div class="section-title">Histórico de Execuções</div>
                <div id="hist-list"></div>
              </div>
            </div>
            
           
            <div class="section">
              <div class="section-title">Relatórios Detalhados</div>
              <div id="reports-list"></div>
            </div>

          </div>

          <script>
            async function loadDashboard() {
              let history = [];
              try {
                const res = await fetch('history.json?_=' + Date.now());
                history = await res.json();
              } catch(e) {
                console.warn('Sem histórico ainda');
              }

              if (!history.length) return;

              const last = history[history.length - 1];
              // 📅 DATA DA EXECUÇÃO
              const dateFormatted = last.date
                .replace('_', ' ')
                .replace(/-(\d{2})$/, ':$1')        // segundos
                .replace(/-(\d{2}):/, ':$1:');      // minutos
              
              document.getElementById('badge-date').textContent =
                'main · Executado em ' + dateFormatted;
              // 🔴 ERROS DA ÚLTIMA EXECUÇÃO
              try {
                const detailsRes = await fetch(last.folder + '/details.json');
                const details = await detailsRes.json();
              
               const failures = details.failures || [];
              const executions = details.executions || [];
              const errorsList = document.getElementById('errors-list');
              
              function getUrlString(urlObj) {
                if (!urlObj) return '';
                if (typeof urlObj === 'string') return urlObj;
                if (urlObj.raw) return urlObj.raw;
                if (Array.isArray(urlObj.host) || Array.isArray(urlObj.path)) {
                  const host = Array.isArray(urlObj.host) ? urlObj.host.join('.') : '';
                  const path = Array.isArray(urlObj.path) ? '/' + urlObj.path.join('/') : '';
                  return host + path;
                }
                return '';
              }
              
              function findExecutionForFailure(failure, executions) {
                const sourceName = failure.source?.name || '';
              
                return executions.find(e =>
                  e.item?.name === sourceName ||
                  e.cursor?.ref === sourceName ||
                  e.cursor?.httpRequestId === sourceName
                );
              }
              
              if (!failures.length) {
                errorsList.innerHTML = '<div style="color:#68d391;">✔ Nenhum erro</div>';
              } else {
                errorsList.innerHTML = failures.map(f => {
                 const index = failures.indexOf(f);
                 const exec = executions[index];
              
                  const method = exec?.request?.method || 'REQUEST';
                  const url = getUrlString(exec?.request?.url) || 'URL não identificada';
                  const testName = f.source?.name || 'Teste não identificado';
                  const msg = f.error?.message || 'erro desconhecido';
              
                  return `
                    <div style="
                      padding:10px;
                      border-bottom:1px solid rgba(255,255,255,0.05);
                      font-family:monospace;
                      font-size:11px;
                    ">
                      <div style="color:#63b3ed;">${method} ${url}</div>
                      <div style="color:#fc8181;">${testName}</div>
                      <div style="color:#a0aec0;">${msg}</div>
                    </div>
                  `;
                }).join('');
              }
              
              } catch(e) {
                console.error('Erro ao carregar failures', e);
              }
              const prev = history.length > 1 ? history[history.length - 2] : null;

              // KPIs
              document.getElementById('kpi-passed').textContent  = last.passed;
              document.getElementById('kpi-failed').textContent  = last.failed;
              document.getElementById('kpi-total').textContent   = last.total;
              document.getElementById('kpi-success').textContent = parseFloat(last.success).toFixed(1) + '%';

              if (prev) {
                const delta = (parseFloat(last.success) - parseFloat(prev.success)).toFixed(1);
                const sign  = delta >= 0 ? '+' : '';
                document.getElementById('kpi-delta').textContent = sign + delta + '% vs anterior';
              }

              // Progress bar
              const pct = parseFloat(last.success);
              document.getElementById('progress-fill').style.width = pct + '%';
              document.getElementById('progress-label').textContent = last.passed + ' / ' + last.total;

              // Status dot
              const dot = document.getElementById('run-dot');
              if (pct >= 90) {
                dot.style.background = '#68d391';
                dot.style.boxShadow  = '0 0 8px #68d391';
                document.getElementById('run-status').textContent = 'última execução concluída com sucesso';
              } else {
                dot.style.background = '#fc8181';
                dot.style.boxShadow  = '0 0 8px #fc8181';
                document.getElementById('run-status').textContent = 'última execução com falhas acima do limite';
              }

              // Chart
              const last12 = history.slice(-12);
              const labels  = last12.map(r => {
                const parts = r.date.split('_');
                return parts[0] ? parts[0].substring(5) : r.date.substring(0,10);
              });
              const failed  = last12.map(r => parseInt(r.failed));
              const passed  = last12.map(r => parseInt(r.passed));

              new Chart(document.getElementById('chartEvolucao'), {
                type: 'line',
                data: {
                  labels,
                  datasets: [
                    {
                      label: 'Falhas',
                      data: failed,
                      borderColor: '#fc8181',
                      backgroundColor: 'rgba(252,129,129,0.07)',
                      borderWidth: 2,
                      pointBackgroundColor: '#fc8181',
                      pointRadius: 3,
                      tension: 0.4,
                      fill: true
                    },
                    {
                      label: 'Passou',
                      data: passed,
                      borderColor: '#68d391',
                      backgroundColor: 'rgba(104,211,145,0.05)',
                      borderWidth: 2,
                      pointBackgroundColor: '#68d391',
                      pointRadius: 3,
                      tension: 0.4,
                      fill: true
                    }
                  ]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                    x: {
                      grid: { color: 'rgba(255,255,255,0.03)' },
                      ticks: { color: '#4a5568', font: { family: 'IBM Plex Mono', size: 9 }, maxRotation: 45, autoSkip: true }
                    },
                    y: {
                      grid: { color: 'rgba(255,255,255,0.03)' },
                      ticks: { color: '#4a5568', font: { family: 'IBM Plex Mono', size: 9 } } 
                    }
                  }
                }
              });

              // Histórico
              const histList = document.getElementById('hist-list');
              const recent = [...history].reverse().slice(0, 8);
              histList.innerHTML = recent.map(r => {
                const s = parseFloat(r.success);
                const bad = parseInt(r.failed) > 0;
                return '<div class="hist-row">' +
                  '<div class="hist-dot' + (bad ? ' bad' : '') + '"></div>' +
                  '<div class="hist-date">' + r.date.replace(/_/g,' ') + '</div>' +
                  '<div class="hist-track"><div class="hist-fill' + (bad ? ' bad' : '') + '" style="width:' + s + '%"></div></div>' +
                  '<div class="hist-pct">' + s.toFixed(0) + '%</div>' +
                '</div>';
              }).join('');

              // Links para relatórios
              const reportsList = document.getElementById('reports-list');
              reportsList.innerHTML = recent.map(r =>
                '<a class="report-link" href="./' + r.folder + '/">' +
                  '<span>' + r.date.replace(/_/g,' ') + ' / index.html</span>' +
                  '<span class="report-arrow">→</span>' +
                '</a>'
              ).join('');
            }

            loadDashboard();
          </script>

          </body>
          </html>
          HTMLEOF

      # 🔹 Publicar no GitHub Pages
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
