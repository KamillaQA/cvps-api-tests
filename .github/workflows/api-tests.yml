name: API Tests - Postman

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔹 Node
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔹 Dependências
      - name: Instalar dependências
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          sudo apt-get update
          sudo apt-get install -y jq 

      # 🔹 Baixar histórico existente
      - name: Baixar histórico do GitHub Pages
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
          mkdir -p public
          cp -r gh-pages/* public/ || true

      # 🔹 Criar environment com secrets
      - name: Criar environment com secrets
        run: |
          echo '{
            "values": [
              { "key": "baseUrl",    "value": "${{ secrets.BASE_URL }}" },
              { "key": "apiVersion", "value": "${{ secrets.API_VERSION }}" },
              { "key": "usuario",    "value": "${{ secrets.USUARIO }}" },
              { "key": "senha",      "value": "${{ secrets.SENHA }}" }
            ]
          }' > environment.json

      # 🔹 Rodar testes
      - name: Rodar testes com relatório
        run: |
          newman run collection.json \
          -e environment.json \
          --reporters cli,json \
          --reporter-json-export report.json
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
      
          REQUESTS=$(jq '.run.stats.requests.total' report.json)
          PREREQUEST=$(jq '.run.stats.prerequests.total' report.json)
          TESTS=$(jq '.run.stats.tests.total' report.json)
      
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
      
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV
      
          echo "REQUESTS=$REQUESTS" >> $GITHUB_ENV
          echo "PREREQUEST=$PREREQUEST" >> $GITHUB_ENV
          echo "TESTS=$TESTS" >> $GITHUB_ENV

      # 🔹 Timestamp
      - name: Gerar timestamp
        run: |
          DATE=$(TZ="America/Sao_Paulo" date +'%Y-%m-%d_%H-%M-%S')
          HUMAN_DATE=$(TZ="America/Sao_Paulo" date +'%d/%m às %H:%M')
          EXEC_TS=$(TZ="America/Sao_Paulo" date +%s)
          NOW_TS=$(date +%s)
      
          DIFF_MIN=$(( (NOW_TS - EXEC_TS) / 60 ))
      
          if [ "$DIFF_MIN" -lt 1 ]; then
            RELATIVE="agora"
          elif [ "$DIFF_MIN" -lt 60 ]; then
            RELATIVE="há ${DIFF_MIN} min"
          else
            DIFF_H=$(( DIFF_MIN / 60 ))
            RELATIVE="há ${DIFF_H}h"
          fi
      
          DISPLAY_DATE="Executado em ${HUMAN_DATE} (${RELATIVE})"
      
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "DISPLAY_DATE=$DISPLAY_DATE" >> $GITHUB_ENV

      # 🔹 Criar pasta da execução
      - name: Criar estrutura
        run: mkdir -p public/$DATE

      - name: Gerar dados detalhados
        run: |
          mkdir -p public/$DATE
      
          jq '{
            summary: .run.stats,
            timings: .run.timings,
            failures: .run.failures,
            executions: .run.executions
          }' report.json > public/$DATE/details.json

      # 🔹 Atualizar histórico JSON
      - name: Atualizar histórico JSON
        run: |
          FILE=public/history.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi
      
          jq ". += [{
            \"date\": \"$DATE\", 
            \"folder\": \"$DATE\",
            \"failed\": $FAILED,
            \"passed\": $PASSED,
            \"total\": $TOTAL,
            \"success\": $SUCCESS,
            \"summary\": {
              \"requests\": $REQUESTS,
              \"prerequest\": $PREREQUEST,
              \"tests\": $TESTS
            }
          }]" $FILE > tmp.json && mv tmp.json $FILE
          
     # 🔹 Gerar wrapper
      - name: Gerar página de detalhes
        run: |
          cat > public/$DATE/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Relatório Detalhado</title>
        
            <style>
              body {
                background:#0a0e1a;
                color:#e2e8f0;
                font-family:'Segoe UI', sans-serif;
                margin:0;
              }
        
              .topbar {
                padding:15px 25px;
                display:flex;
                justify-content:space-between;
                border-bottom:1px solid rgba(255,255,255,0.05);
              }
        
              .summary-bar {
                display:flex;
                gap:25px;
                padding:15px 25px;
                border-bottom:1px solid rgba(255,255,255,0.05);
              }
        
              .summary-item {
                font-family:monospace;
              }
        
              .green { color:#68d391; }
              .red { color:#fc8181; }
              .blue { color:#63b3ed; }
              .gold { color:#f6ad55; }
        
              .progress {
                height:4px;
                background:#111;
              }
        
              .progress div {
                height:100%;
                background:linear-gradient(90deg,#4299e1,#68d391);
              }
        
              .content {
                padding:25px;
              }
        
              table {
                width:100%;
                border-collapse:collapse;
                margin-top:20px;
                font-family:monospace;
              }
        
              td,th {
                padding:10px;
                border-bottom:1px solid #222;
              }
        
              .fail { color:#fc8181; }
            </style>
          </head>
        
          <body>
        
          <div class="topbar">
            <div>
              <b>API Quality Dashboard</b><br>
              <small>Relatório detalhado</small>
            </div>
            <div>${{ env.DISPLAY_DATE }}</div>
          </div>
        
          <div class="summary-bar">
            <div class="summary-item">
              PASSOU<br><span class="green" id="passed"></span>
            </div>
            <div class="summary-item">
              FALHOU<br><span class="red" id="failed"></span>
            </div>
            <div class="summary-item">
              TOTAL<br><span class="blue" id="total"></span>
            </div>
            <div class="summary-item">
              SUCESSO<br><span class="gold" id="success"></span>
            </div>
          </div>
        
          <div class="progress">
            <div id="progress-bar" style="width:0%"></div>
          </div>
        
          <div class="content">
        
            <h3>Resumo dos Testes</h3>
        
            <table id="summary-table"></table>
        
          </div>
        
          <script>
            async function load() {
        
              const [detailsRes, historyRes] = await Promise.all([
                fetch('details.json'),
                fetch('../history.json')
              ]);
        
              const details = await detailsRes.json();
              const history = await historyRes.json();
        
              const current = history[history.length - 1];
        
              // TOPO
              document.getElementById('passed').textContent = current.passed;
              document.getElementById('failed').textContent = current.failed;
              document.getElementById('total').textContent = current.total;
              document.getElementById('success').textContent = current.success + '%';
        
              document.getElementById('progress-bar').style.width = current.success + '%';
        
              // SUMMARY
              const s = details.summary;
        
              document.getElementById('summary-table').innerHTML = `
                <tr><th>Item</th><th>Total</th><th>Failed</th></tr>
                <tr><td>Requests</td><td>${s.requests.total}</td><td>${s.requests.failed}</td></tr>
                <tr><td>Prerequest Scripts</td><td>${s.prerequests.total}</td><td>${s.prerequests.failed}</td></tr>
                <tr><td>Test Scripts</td><td>${s.tests.total}</td><td>${s.tests.failed}</td></tr>
                <tr class="fail">
                  <td>Assertions</td>
                  <td>${s.assertions.total}</td>
                  <td>${s.assertions.failed}</td>
                </tr>
              `;
            }
        
            load();
          </script>
        
          </body>
          </html>
          EOF
      # 🔹 Gerar dashboard visual
      - name: Gerar dashboard
        run: |
          DATA_BR=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')
      
          STATUS_COLOR="#68d391"
          STATUS_TEXT="Passou"
          if (( $(echo "$SUCCESS < 90" | bc -l) )); then
            STATUS_COLOR="#fc8181"
            STATUS_TEXT="Atenção"
          fi
      
          cat <<HTMLEOF > public/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Dashboard de Qualidade · API CVPS</title>
      
            <style>
              body {
                background:#0a0e1a;
                color:#e2e8f0;
                font-family:sans-serif;
                margin:0;
              }
      
              .topbar {
                display:flex;
                justify-content:space-between;
                padding:15px 25px;
                border-bottom:1px solid rgba(255,255,255,0.05);
              }
      
              .run-badge {
                font-family: monospace;
                font-size: 11px;
                padding: 6px 12px;
                border-radius: 20px;
                border: 1px solid rgba(99,179,237,0.3);
                color: #63b3ed;
                background: rgba(99,179,237,0.08);
              }
      
              .body {
                padding:25px;
              }
      
              .cards {
                display:grid;
                grid-template-columns: repeat(4,1fr);
                gap:15px;
              }
      
              .card {
                background:#111827;
                padding:15px;
                border-radius:10px;
              }
      
              .green { color:#68d391; }
              .red { color:#fc8181; }
              .blue { color:#63b3ed; }
              .gold { color:#f6ad55; }
      
            </style>
          </head>
      
          <body>
      
          <!-- TOPO CORRETO -->
          <div class="topbar">
            <div>
              <b>API Quality Dashboard</b><br>
              <small>CVPS · GitHub Actions</small>
            </div>
      
            <!-- DATA VINDO DO PIPELINE -->
            <div class="run-badge">
              main · $DISPLAY_DATE
            </div>
          </div>
      
          <div class="body">
      
            <div class="cards">
              <div class="card">
                PASSOU<br><span class="green" id="kpi-passed">—</span>
              </div>
      
              <div class="card">
                FALHOU<br><span class="red" id="kpi-failed">—</span>
              </div>
      
              <div class="card">
                TOTAL<br><span class="blue" id="kpi-total">—</span>
              </div>
      
              <div class="card">
                SUCESSO<br><span class="gold" id="kpi-success">—</span>
              </div>
            </div>
      
          </div>
      
          <script>
            async function loadDashboard() {
              const res = await fetch('history.json?_=' + Date.now());
              const history = await res.json();
      
              if (!history.length) return;
      
              const last = history[history.length - 1];
      
              document.getElementById('kpi-passed').textContent  = last.passed;
              document.getElementById('kpi-failed').textContent  = last.failed;
              document.getElementById('kpi-total').textContent   = last.total;
              document.getElementById('kpi-success').textContent = last.success + '%';
            }
      
            loadDashboard();
          </script>
      
          </body>
          </html>
          HTMLEOF
      # 🔹 Publicar no GitHub Pages
      - name: Publicar no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
