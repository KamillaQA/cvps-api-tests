<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Qualidade · API CVPS</title>

  <style>
    body {
      background:#0a0e1a;
      color:#e2e8f0;
      font-family:sans-serif;
      margin:0;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:15px 25px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .run-badge {
      font-family: monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(99,179,237,0.3);
      color: #63b3ed;
      background: rgba(99,179,237,0.08);
    }

    .body {
      padding:25px;
    }

    .cards {
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:15px;
    }

    .card {
      background:#111827;
      padding:15px;
      border-radius:10px;
    }

    .green { color:#68d391; }
    .red { color:#fc8181; }
    .blue { color:#63b3ed; }
    .gold { color:#f6ad55; }

  </style>
</head>

<body>

<!-- TOPO CORRETO -->
<div class="topbar">
  <div>
    <b>API Quality Dashboard</b><br>
    <small>CVPS · GitHub Actions</small>
  </div>

  <!-- DATA VINDO DO PIPELINE -->
  <div class="run-badge">
    main · Executado em 17/04 às 10:38 (agora)
  </div>
</div>

<div class="body">

  <div class="cards">
    <div class="card">
      PASSOU<br><span class="green" id="kpi-passed">—</span>
    </div>

    <div class="card">
      FALHOU<br><span class="red" id="kpi-failed">—</span>
    </div>

    <div class="card">
      TOTAL<br><span class="blue" id="kpi-total">—</span>
    </div>

    <div class="card">
      SUCESSO<br><span class="gold" id="kpi-success">—</span>
    </div>
  </div>

</div>

<script>
  async function loadDashboard() {
    const res = await fetch('history.json?_=' + Date.now());
    const history = await res.json();

    if (!history.length) return;

    const last = history[history.length - 1];

    document.getElementById('kpi-passed').textContent  = last.passed;
    document.getElementById('kpi-failed').textContent  = last.failed;
    document.getElementById('kpi-total').textContent   = last.total;
    document.getElementById('kpi-success').textContent = last.success + '%';
  }

  loadDashboard();
</script>

</body>
</html>
